# Perfil dos testes de integracao (Issue 24): PostgreSQL real via Testcontainers.
# A url/usuario/senha do datasource sao injetadas pelo @DynamicPropertySource da
# classe base IntegracaoPostgresTest.
#
# Ao contrario do perfil "test" (H2 + create-drop + flyway off), aqui o Flyway
# roda de verdade e o Hibernate apenas valida - e essa combinacao que prova que
# as migrations V1..V6 batem com as entidades.

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.validate-on-migrate=true
spring.sql.init.mode=never

management.endpoints.enabled-by-default=false

# JWT para os testes de integracao (minimo 32 caracteres)
app.jwt.secret=chave-de-integracao-apenas-para-os-testes-automatizados
app.jwt.expiracao-segundos=3600

# O AdminBootstrap cria este usuario no startup do contexto: o teste de
# autenticacao usa o caminho real de producao, sem inserir usuario na marra.
app.admin.login=administrador
app.admin.senha=senha-de-integracao-123
app.admin.codigo-responsavel=1000

app.cors.origens=http://localhost:3000