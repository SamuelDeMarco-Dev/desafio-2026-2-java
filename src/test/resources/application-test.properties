# Sem MODE=PostgreSQL: nesse modo o H2 rejeita TINYINT, tipo que o Hibernate
# emite para a coluna revtype das tabelas de auditoria do Envers. O modo tambem
# nunca cumpriu a promessa de imitar o PostgreSQL - ver o aviso do README sobre
# o bug de nulos sem tipo, que passou verde aqui e quebrou no banco real.
spring.datasource.url=jdbc:h2:mem:documentos_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=false

management.endpoints.enabled-by-default=false

# JWT para os testes automatizados (minimo 32 caracteres - exigencia do HS256)
app.jwt.secret=chave-de-teste-apenas-para-os-testes-automatizados
app.jwt.expiracao-segundos=3600