spring.application.name=documentos-academicos

server.port=${SERVER_PORT:8080}

spring.profiles.default=dev

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Paginação: evita consultas com páginas gigantes
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.default-page-size=20

# Administrador inicial (criado no startup apenas se ADMIN_PASSWORD estiver definido)
app.admin.login=${ADMIN_LOGIN:administrador}
app.admin.senha=${ADMIN_PASSWORD:}
app.admin.codigo-responsavel=${ADMIN_CODIGO_RESPONSAVEL:1000}

# JWT — sem default: a aplicação falha no startup se JWT_SECRET não existir
app.jwt.secret=${JWT_SECRET}
app.jwt.expiracao-segundos=${JWT_EXPIRACAO_SEGUNDOS:3600}

# CORS — lista explícita de origens permitidas (nunca "*")
app.cors.origens=${CORS_ORIGENS:http://localhost:3000}

# Auditoria (Hibernate Envers)
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_aud
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true

